<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dark Vision Settings</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <header class="header">
      <div class="brand">
        <div class="logo-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </div>
        <div class="brand-text">
          <h1>Dark Vision</h1>
          <span class="version-tag">v1.0.0</span>
        </div>
      </div>
      <label class="master-switch" title="Toggle Universal Dark Mode">
        <input type="checkbox" id="master-toggle">
        <span class="switch-slider"></span>
      </label>
    </header>

    <!-- Active Website Card -->
    <section class="site-card">
      <div class="site-info">
        <span class="site-label">Active Site:</span>
        <span class="site-domain" id="current-domain">Detecting...</span>
      </div>
      <button class="btn-whitelist" id="btn-toggle-whitelist">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"></line>
        </svg>
        <span id="whitelist-btn-text">Disable on this site</span>
      </button>
    </section>

    <!-- Theme Presets -->
    <section class="section">
      <h2 class="section-title">Theme Presets</h2>
      <div class="theme-grid">
        <button class="theme-card active" data-theme="midnight">
          <div class="theme-preview midnight"></div>
          <span>Midnight</span>
        </button>
        <button class="theme-card" data-theme="pitch">
          <div class="theme-preview pitch"></div>
          <span>Pitch Black</span>
        </button>
        <button class="theme-card" data-theme="sepia">
          <div class="theme-preview sepia"></div>
          <span>Warm Sepia</span>
        </button>
        <button class="theme-card" data-theme="soft">
          <div class="theme-preview soft"></div>
          <span>Soft Dark</span>
        </button>
      </div>
    </section>

    <!-- Fine-Tuning Controls -->
    <section class="section">
      <h2 class="section-title">Adjustments</h2>
      
      <div class="slider-group">
        <div class="slider-header">
          <label for="brightness">Brightness</label>
          <span class="slider-value" id="val-brightness">100%</span>
        </div>
        <input type="range" id="brightness" min="50" max="150" value="100" class="slider">
      </div>

      <div class="slider-group">
        <div class="slider-header">
          <label for="contrast">Contrast</label>
          <span class="slider-value" id="val-contrast">100%</span>
        </div>
        <input type="range" id="contrast" min="50" max="150" value="100" class="slider">
      </div>

      <div class="slider-group">
        <div class="slider-header">
          <label for="sepia">Sepia Tone</label>
          <span class="slider-value" id="val-sepia">0%</span>
        </div>
        <input type="range" id="sepia" min="0" max="100" value="0" class="slider">
      </div>
    </section>

    <!-- Additional Settings -->
    <section class="section extra-settings">
      <div class="setting-row">
        <div class="setting-info">
          <span class="setting-title">Auto System Preference</span>
          <span class="setting-desc">Sync with OS light/dark schedule</span>
        </div>
        <label class="mini-switch">
          <input type="checkbox" id="auto-system-toggle">
          <span class="switch-slider"></span>
        </label>
      </div>
    </section>

    <!-- Footer Actions -->
    <footer class="footer">
      <button class="btn-secondary" id="btn-reset">Reset Defaults</button>
      <div class="footer-links">
        <span>GitHub Educational Project</span>
      </div>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
